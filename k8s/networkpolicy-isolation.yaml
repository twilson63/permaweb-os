apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-os-security-policy
  namespace: web-os
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 8080

  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
  - to:
    - namespaceSelector:
        matchLabels:
          namespace: web-os
    ports:
    - protocol: TCP
      port: 443
