apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-os-routing
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-routing
    app.kubernetes.io/part-of: web-os
  annotations:
    # Support WebSocket upgrades
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: api
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: api.web-os.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
    - host: "*.web-os.local"
      http:
        paths:
          # ALL traffic goes through auth-proxy (auth-http port 3001).
          # Auth-proxy handles authentication and proxies to OpenCode (port 4096).
          # This prevents the OpenCode web UI from being served directly and
          # ensures /v1/chat/completions and other API routes work correctly.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-pod
                port:
                  name: auth-http
