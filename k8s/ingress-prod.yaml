apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-os-routing
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-routing
    app.kubernetes.io/part-of: web-os
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: api
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: api.permaweb.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
    - host: "*.pods.permaweb.run"
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: user-pod
                port:
                  name: httpsig-http
          - path: /verify
            pathType: Prefix
            backend:
              service:
                name: user-pod
                port:
                  name: httpsig-http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-pod
                port:
                  name: opencode-http