apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-api
    app.kubernetes.io/part-of: web-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-os-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-os-api
        app.kubernetes.io/part-of: web-os
    spec:
      containers:
        - name: api
          image: docker.io/library/web-os-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi