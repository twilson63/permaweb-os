apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pod-{{POD_ID}}
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-user-pod
    app.kubernetes.io/part-of: web-os
    pod-id: "{{POD_ID}}"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{POD_ID}}.{{BASE_DOMAIN}}
      secretName: web-os-tls
  rules:
    - host: {{POD_ID}}.{{BASE_DOMAIN}}
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: pod-{{POD_ID}}
                port:
                  name: httpsig-http
          - path: /verify
            pathType: Prefix
            backend:
              service:
                name: pod-{{POD_ID}}
                port:
                  name: httpsig-http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pod-{{POD_ID}}
                port:
                  name: opencode-http