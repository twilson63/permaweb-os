# LLM API Keys Secret (DEPRECATED)
#
# This global secret is DEPRECATED for multi-tenant deployments.
# Use per-wallet secrets instead (see api/src/llm/secret-manager.ts).
#
# Per-wallet secrets are created via:
#   POST /api/llm/keys (with wallet authentication)
#
# Or manually:
#   kubectl create secret generic llm-keys-<hash> --from-literal=openai=sk-...
#
# This file is kept for development/testing purposes only.
# DO NOT use in production multi-tenant environments.

apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-llm-api-keys
    app.kubernetes.io/part-of: web-os
  annotations:
    # Mark as deprecated
    deprecated: "true"
    replacement: "Use per-wallet secrets via POST /api/llm/keys"
type: Opaque
stringData:
  openai: "replace-with-openai-api-key"
  anthropic: "replace-with-anthropic-api-key"
---
# For multi-tenant deployments, create per-wallet secrets:
#
# Example for wallet 0xABC123...:
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: llm-keys-a1b2c3d4e5f67890  # SHA256(wallet)[:16]
#   namespace: web-os
#   labels:
#     app.kubernetes.io/name: web-os-llm-keys
#     app.kubernetes.io/part-of: web-os
#     web-os.io/wallet-hash: "a1b2c3d4e5f67890"
# type: Opaque
# stringData:
#   openai: "sk-user-specific-key"
#   anthropic: "sk-ant-user-specific-key"