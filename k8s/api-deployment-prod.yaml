apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: web-os
  labels:
    app.kubernetes.io/name: web-os-api
    app.kubernetes.io/part-of: web-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-os-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-os-api
        app.kubernetes.io/part-of: web-os
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: web-os-api
      imagePullSecrets:
        - name: registry-scout-live
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: registry.digitalocean.com/scout-live/web-os-api:amd64
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: POD_BASE_DOMAIN
              value: "pods.permaweb.run"
            - name: LLM_SECRETS_DIR
              value: /secrets/llm
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBECONFIG
              value: /home/webos/.kube/config
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: kubeconfig
              mountPath: /home/webos/.kube
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeconfig
            items:
              - key: config
                path: config