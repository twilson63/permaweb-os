<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web-OS Chat SDK - Basic Template</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      background: #1a1a1a;
      padding: 1rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.25rem; color: #00ff88; }
    .wallet-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .wallet-address {
      font-family: monospace;
      font-size: 0.875rem;
      background: #2a2a2a;
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }
    
    /* Main Layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid #333;
    }
    .create-pod-btn {
      width: 100%;
      padding: 0.75rem;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .create-pod-btn:hover { background: #00cc6a; }
    .create-pod-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .pod-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .pod-item {
      padding: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.25rem;
    }
    .pod-item:hover { background: #2a2a2a; }
    .pod-item.active { background: #2a2a2a; border-left: 3px solid #00ff88; }
    .pod-item .pod-name { font-weight: 500; margin-bottom: 0.25rem; }
    .pod-item .pod-status { font-size: 0.75rem; color: #888; }
    
    /* Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .message {
      margin-bottom: 1rem;
      max-width: 70%;
    }
    .message.user { margin-left: auto; }
    .message-header {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.25rem;
    }
    .message-content {
      background: #2a2a2a;
      padding: 0.75rem 1rem;
      border-radius: 8px;
    }
    .message.user .message-content { background: #00ff8820; }
    
    /* Input */
    .chat-input {
      padding: 1rem;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      gap: 0.5rem;
    }
    .chat-input input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 1rem;
    }
    .chat-input input:focus { outline: none; border-color: #00ff88; }
    .chat-input button {
      padding: 0.75rem 1.5rem;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-input button:hover { background: #00cc6a; }
    
    /* Auth Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: #1a1a1a;
      padding: 2rem;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
    }
    .modal h2 { margin-bottom: 1rem; }
    .modal p { color: #888; margin-bottom: 1.5rem; }
    .wallet-btns { display: flex; flex-direction: column; gap: 0.75rem; }
    .wallet-btn {
      padding: 1rem;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1rem;
    }
    .wallet-btn:hover { background: #3a3a3a; border-color: #00ff88; }
    .wallet-btn img { width: 24px; height: 24px; }
    
    /* Status */
    .status { padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.875rem; }
    .status.info { background: #0066ff20; color: #0088ff; }
    .status.success { background: #00ff8820; color: #00ff88; }
    .status.error { background: #ff006620; color: #ff4488; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 Web-OS Chat</h1>
    <div class="wallet-info">
      <span class="wallet-address" id="walletAddress">Not connected</span>
      <button id="connectBtn" onclick="showAuthModal()">Connect</button>
    </div>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="create-pod-btn" id="createPodBtn" onclick="createPod()" disabled>
          + New Pod
        </button>
      </div>
      <div class="pod-list" id="podList">
        <div style="padding: 1rem; text-align: center; color: #888;">
          Connect wallet to see your pods
        </div>
      </div>
    </div>
    
    <div class="chat-container">
      <div class="chat-header">
        <div>
          <h2 id="podName">Select a pod</h2>
          <small id="podStatus" style="color: #888;"></small>
        </div>
        <div id="statusDisplay"></div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div style="padding: 2rem; text-align: center; color: #888;">
          Select or create a pod to start chatting
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
  
  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h2>Connect Wallet</h2>
      <p>Choose your wallet to authenticate with Web-OS</p>
      <div class="wallet-btns">
        <button class="wallet-btn" onclick="connectEthereum()">
          🦊 Connect MetaMask
        </button>
        <button class="wallet-btn" onclick="connectArweave()">
          🔗 Connect Wander
        </button>
      </div>
    </div>
  </div>

  <!-- ArweaveJS for transaction signing -->
  <script src="https://cdn.jsdelivr.net/npm/arweave@1.15.7/bundles/arweave.bundle.min.js"></script>
  
  <script>
    // Configuration
    const API_URL = 'https://api.permaweb.run';
    let sessionToken = null;
    let currentPod = null;
    let ws = null;

    // Auth Functions
    function showAuthModal() {
      document.getElementById('authModal').style.display = 'flex';
    }
    
    function hideAuthModal() {
      document.getElementById('authModal').style.display = 'none';
    }
    
    async function connectEthereum() {
      if (!window.ethereum) {
        alert('MetaMask not installed!');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const address = accounts[0].toLowerCase();
        
        // Get nonce
        const nonceRes = await fetch(`${API_URL}/api/auth/nonce`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, walletType: 'ethereum' })
        });
        const nonceData = await nonceRes.json();
        
        // Sign message
        const signature = await window.ethereum.request({
          method: 'personal_sign',
          params: [nonceData.message, address]
        });
        
        // Verify
        const verifyRes = await fetch(`${API_URL}/api/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, signature, walletType: 'ethereum' })
        });
        const verifyData = await verifyRes.json();
        
        if (verifyData.token) {
          sessionToken = verifyData.token;
          document.getElementById('walletAddress').textContent = `${address.slice(0, 8)}...${address.slice(-6)}`;
          document.getElementById('connectBtn').textContent = 'Disconnect';
          document.getElementById('connectBtn').onclick = disconnect;
          document.getElementById('createPodBtn').disabled = false;
          hideAuthModal();
          await loadPods();
        } else {
          throw new Error(verifyData.error || 'Authentication failed');
        }
      } catch (err) {
        console.error('Ethereum auth error:', err);
        alert('Authentication failed: ' + err.message);
      }
    }
    
    async function connectArweave() {
      const wallet = window.wander || window.arweaveWallet;
      if (!wallet) {
        alert('Wander wallet not installed!');
        return;
      }
      
      try {
        // Request permissions
        await wallet.connect(['SIGN_TRANSACTION', 'ACCESS_ADDRESS']);
        const address = await wallet.getActiveAddress();
        
        // Get nonce
        const nonceRes = await fetch(`${API_URL}/api/auth/nonce`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, walletType: 'arweave' })
        });
        const nonceData = await nonceRes.json();
        const message = nonceData.message;
        
        // Create and sign transaction
        const arweave = Arweave.init({ host: 'arweave.net', port: 443, protocol: 'https' });
        const tx = await arweave.createTransaction({ data: message });
        const signedTx = await wallet.sign(tx);
        
        // Verify
        const verifyRes = await fetch(`${API_URL}/api/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            address,
            message,
            signature: signedTx.signature,
            owner: signedTx.owner,
            reward: signedTx.reward?.toString(),
            lastTx: signedTx.last_tx,
            dataSize: signedTx.data_size?.toString(),
            dataRoot: signedTx.data_root,
            tags: signedTx.tags || [],
            walletType: 'arweave'
          })
        });
        const verifyData = await verifyRes.json();
        
        if (verifyData.token) {
          sessionToken = verifyData.token;
          document.getElementById('walletAddress').textContent = `${address.slice(0, 8)}...${address.slice(-6)}`;
          document.getElementById('connectBtn').textContent = 'Disconnect';
          document.getElementById('connectBtn').onclick = disconnect;
          document.getElementById('createPodBtn').disabled = false;
          hideAuthModal();
          await loadPods();
        } else {
          throw new Error(verifyData.error || 'Authentication failed');
        }
      } catch (err) {
        console.error('Arweave auth error:', err);
        alert('Authentication failed: ' + err.message);
      }
    }
    
    function disconnect() {
      sessionToken = null;
      document.getElementById('walletAddress').textContent = 'Not connected';
      document.getElementById('connectBtn').textContent = 'Connect';
      document.getElementById('connectBtn').onclick = showAuthModal;
      document.getElementById('createPodBtn').disabled = true;
      document.getElementById('podList').innerHTML = '<div style="padding: 1rem; text-align: center; color: #888;">Connect wallet to see your pods</div>';
    }
    
    // Pod Functions
    async function loadPods() {
      if (!sessionToken) return;
      
      try {
        const res = await fetch(`${API_URL}/api/pods`, {
          headers: { 'Authorization': `Bearer ${sessionToken}` }
        });
        const data = await res.json();
        
        const podList = document.getElementById('podList');
        if (data.pods && data.pods.length > 0) {
          podList.innerHTML = data.pods.map(pod => `
            <div class="pod-item" onclick="selectPod('${pod.id}')">
              <div class="pod-name">${pod.id.slice(0, 8)}</div>
              <div class="pod-status">${pod.status || 'running'}</div>
            </div>
          `).join('');
        } else {
          podList.innerHTML = '<div style="padding: 1rem; text-align: center; color: #888;">No pods yet. Create one!</div>';
        }
      } catch (err) {
        console.error('Load pods error:', err);
      }
    }
    
    async function createPod() {
      if (!sessionToken) {
        alert('Please connect wallet first');
        return;
      }
      
      const model = 'openrouter/anthropic/claude-3.5-sonnet'; // Default model
      
      try {
        const res = await fetch(`${API_URL}/api/pods`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${sessionToken}`
          },
          body: JSON.stringify({ model })
        });
        const data = await res.json();
        
        if (data.id) {
          await loadPods();
          selectPod(data.id);
        } else {
          throw new Error(data.error || 'Failed to create pod');
        }
      } catch (err) {
        console.error('Create pod error:', err);
        alert('Failed to create pod: ' + err.message);
      }
    }
    
    function selectPod(podId) {
      currentPod = podId;
      document.getElementById('podName').textContent = `Pod: ${podId.slice(0, 8)}`;
      document.getElementById('podStatus').textContent = 'Connected';
      
      // Update active state
      document.querySelectorAll('.pod-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.pod-item').classList.add('active');
      
      // Connect WebSocket
      connectWebSocket(podId);
    }
    
    // WebSocket Functions
    function connectWebSocket(podId) {
      if (ws) ws.close();
      
      const wsUrl = API_URL.replace('https://', 'wss://') + `/ws?pod=${podId}&token=${sessionToken}`;
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        console.log('WebSocket connected');
        showStatus('Connected', 'success');
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        addMessage(data.role, data.content);
      };
      
      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        showStatus('Connection error', 'error');
      };
      
      ws.onclose = () => {
        console.log('WebSocket closed');
        showStatus('Disconnected', 'error');
      };
    }
    
    function addMessage(role, content) {
      const chatMessages = document.getElementById('chatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role === 'user' ? 'user' : ''}`;
      msgDiv.innerHTML = `
        <div class="message-header">${role === 'user' ? 'You' : 'Assistant'}</div>
        <div class="message-content">${content}</div>
      `;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
      
      addMessage('user', message);
      ws.send(JSON.stringify({ type: 'message', content: message }));
      input.value = '';
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') sendMessage();
    }
    
    function showStatus(text, type) {
      const statusDisplay = document.getElementById('statusDisplay');
      statusDisplay.innerHTML = `<span class="status ${type}">${text}</span>`;
    }
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
      showAuthModal();
    });
  </script>
</body>
</html>
