name: Branch Protection

on:
  push:
    branches: [main]

jobs:
  # This workflow documents the branch protection rules
  # Configure these in GitHub Settings > Branches > Branch protection rules
  #
  # Recommended settings for 'main' branch:
  # - Require a pull request before merging
  # - Require approvals: 1
  # - Require status checks to pass before merging
  # - Require branches to be up to date before merging
  # - Status checks: test (from ci.yml)
  # - Require conversation resolution before merging
  # - Do not allow bypassing the above settings
  
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Branch protection info
        run: |
          echo "Branch protection rules should be configured in GitHub Settings"
          echo "See: https://github.com/${{ github.repository }}/settings/branches"