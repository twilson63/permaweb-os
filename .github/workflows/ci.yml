name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com/scout-live

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            auth-proxy/package-lock.json
      
      - name: Install dependencies
        run: |
          cd api && npm ci
          cd ../auth-proxy && npm ci
      
      - name: Lint API
        run: cd api && npm run lint
      
      - name: Lint Auth Proxy
        run: cd auth-proxy && npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            auth-proxy/package-lock.json
            templates/chat-sdk/tests/package-lock.json
      
      - name: Install dependencies
        run: |
          cd api && npm ci
          cd ../auth-proxy && npm ci
          cd ../templates/chat-sdk/tests && npm ci
      
      - name: Run API tests
        run: cd api && npm test
        continue-on-error: true  # Tests are optional for now
      
      - name: Run SDK tests
        run: cd templates/chat-sdk/tests && npm test
        continue-on-error: true  # Tests are optional for now

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      
      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/web-os-api:latest
            ${{ env.REGISTRY }}/web-os-api:${{ github.sha }}
      
      - name: Build and Push Auth Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./auth-proxy
          file: ./auth-proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/web-os-auth-proxy:latest
            ${{ env.REGISTRY }}/web-os-auth-proxy:${{ github.sha }}
      
      - name: Build and Push OpenCode Base
        uses: docker/build-push-action@v5
        with:
          context: ./images/opencode-base
          file: ./images/opencode-base/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/opencode-base:latest
            ${{ env.REGISTRY }}/opencode-base:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_ID }}
      
      - name: Deploy API
        run: |
          kubectl set image deployment/api \
            api=${{ env.REGISTRY }}/web-os-api:${{ github.sha }} \
            -n web-os
          kubectl rollout status deployment/api -n web-os --timeout=120s
      
      - name: Deploy Auth Proxy
        run: |
          kubectl set image deployment/auth-proxy \
            auth-proxy=${{ env.REGISTRY }}/web-os-auth-proxy:${{ github.sha }} \
            -n web-os || true  # Auth proxy is a sidecar, updated when pods restart
      
      - name: Verify Deployment
        run: |
          kubectl get pods -n web-os
          kubectl get services -n web-os
          kubectl get ingress -n web-os

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/web-os-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-api-results.sarif'
        continue-on-error: true
      
      - name: Run Trivy vulnerability scanner (Auth Proxy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/web-os-auth-proxy:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-auth-proxy-results.sarif'
        continue-on-error: true